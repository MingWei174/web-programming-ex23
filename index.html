<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>113403547 張茗崴</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400&display=swap" rel="stylesheet">
    
    <style>
        /* --- 基礎頁面樣式 --- */
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f4f7f6;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .card-container {
            background-color: white;
            width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: 450px; /* 限制卡片最大高度 */
            overflow-y: auto;  /* 讓卡片內容過多時可滑動 */
            display: flex;
            flex-direction: column;
        }

        .card-header {
            background-color: #f6f6f6;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px solid #e0e0e0;
            position: sticky; /* 讓 Header 固定在頂部，滑動時不會消失 */
            top: 0;
            z-index: 10;
        }

        /* --- 按鈕實作 --- */
        .info-btn {
            height: 22px;
            border-radius: 8px;
            background-color: #ffffff;
            border: 1px solid #2f2f2f;
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            font-weight: 400;
            color: #2f2f2f;
            padding: 0 15px;
            cursor: pointer;
            outline: none;
            transition: background-color 0.2s;
        }

        .info-btn:hover {
            background-color: #e8f3ff;
        }

        /* --- 圖片與詳細資訊區塊 --- */
        .card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .image-area {
            display: flex;
            justify-content: center;
        }

        .image-area img {
            width: 450px;
            height: 240px;
            display: block;
            border-radius: 4px;
            background-color: #f0f0f0;
        }

        /* --- 關鍵修改：詳細資訊區塊預設隱藏 --- */
        .details-section {
            display: none; /* 預設隱藏 */
            flex-direction: column;
            border-top: 1px solid #eaeaec;
        }

        /* 當這個 class 被加上去時，會顯示出來 */
        .details-section.active {
            display: flex; 
        }

        .detail-row {
            padding: 8px 10px;
            font-size: 13px;
            color: #707070;
            background-color: #ffffff;
            display: flex;
            gap: 5px;
            align-items: center;
        }
        
        .detail-row.highlight {
            background-color: #d1f3d1;
            color: #333;
        }

        .detail-path {
            color: #0084ff;
        }
        
        .divider-char {
            color: #eaeaec;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-header">
            <button id="toggleBtn" class="info-btn">顯示資訊</button>
        </div>

        <div class="card-body">
            <div class="image-area">
                <img id="randomImage" alt="預覽圖">
            </div>

            <div id="detailsSection" class="details-section">
                <div class="detail-row highlight">修改日期：2017/10/12</div>
                <div class="detail-row highlight">類型：JPG</div>
                <div class="detail-row highlight">大小：466.92KB</div>
                <div class="detail-row highlight">
                    路徑：<span class="detail-path">V:<span class="divider-char">/</span>designcenter.qnap.com<span class="divider-char">/</span>wt<span class="divider-char">/</span>DesignCenter...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 圖片隨機化邏輯 (保留你原本的功能)
        window.addEventListener('DOMContentLoaded', (event) => {
            const imageElement = document.getElementById('randomImage');
            const randomSeed = Math.floor(Math.random() * 100000); 
            imageElement.src = `https://picsum.photos/450/240?random=${randomSeed}`;
        });

        // 2. 顯示/隱藏切換邏輯 (新增)
        const toggleBtn = document.getElementById('toggleBtn');
        const detailsSection = document.getElementById('detailsSection');

        toggleBtn.addEventListener('click', () => {
            // 切換 .active 類別
            detailsSection.classList.toggle('active');
            
            // 根據是否顯示，更新按鈕文字
            if (detailsSection.classList.contains('active')) {
                toggleBtn.textContent = '隱藏資訊';
            } else {
                toggleBtn.textContent = '顯示資訊';
            }
        });
    </script>

</body>
</html>
